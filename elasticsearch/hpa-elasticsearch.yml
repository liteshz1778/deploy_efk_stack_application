apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hp-elasticsearch
  namespace: elastic-stack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: elasticsearch
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
